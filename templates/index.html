<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>m3u-checker Pro | Dashboard</title>
    <!-- 字体与第三方库 -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --success-grad: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --danger-grad: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
            --warning-grad: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            --info-grad: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            --sidebar-grad: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --card-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f7fa; height: 100vh; overflow: hidden; color: #1e293b; 
        }

        /* 侧边栏美化 */
        .sidebar { 
            width: 320px; background: var(--sidebar-grad); height: 100vh; position: fixed; 
            color: white; box-shadow: 10px 0 40px rgba(0, 0, 0, 0.15); z-index: 100; 
        }
        .sidebar-header { padding: 40px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sub-list { height: calc(100vh - 220px); overflow-y: auto; padding: 15px 0; }
        .sub-item { 
            padding: 16px 22px; cursor: pointer; transition: 0.3s; 
            margin: 8px 18px; border-radius: 20px; 
            background: rgba(255,255,255,0.04); border: 1px solid transparent;
        }
        .sub-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .sub-item.active { 
            background: white !important; color: #4f46e5 !important; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); border-left: 6px solid #f59e0b;
        }
        .sub-disabled { opacity: 0.4; filter: grayscale(1); }

        /* 主面板布局 */
        .main { margin-left: 320px; padding: 35px; height: 100vh; overflow-y: auto; }
        .glass-card { 
            background: var(--glass-bg); backdrop-filter: blur(25px); border-radius: 28px; 
            border: 1px solid var(--glass-border); box-shadow: var(--card-shadow); 
            margin-bottom: 25px; padding: 25px; position: relative;
        }

        /* 渐变按钮组 */
        .btn-group-custom { display: flex; gap: 12px; }
        .btn-grad { 
            border: none !important; color: #fff !important; border-radius: 16px; 
            font-weight: 700; padding: 12px 24px; transition: 0.4s; 
            display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        .btn-grad:hover { transform: translateY(-5px); box-shadow: 0 15px 25px rgba(0, 0, 0, 0.15); opacity: 0.95; }
        .btn-add { background: var(--primary-grad) !important; width: 100%; justify-content: center; }
        .btn-success-grad { background: var(--success-grad) !important; }
        .btn-danger-grad { background: var(--danger-grad) !important; }
        .btn-warning-grad { background: var(--warning-grad) !important; }
        .btn-info-grad { background: var(--info-grad) !important; }

        /* 统计数字 */
        .stat-card { text-align: center; border: none; padding: 30px 10px; }
        .stat-card i { font-size: 4rem; opacity: 0.05; position: absolute; right: -10px; bottom: -10px; }
        .stat-value { font-size: 2.6rem; font-weight: 900; letter-spacing: -1.5px; margin-top: 5px; }

        /* 流光进度条 */
        .progress { height: 16px; border-radius: 50px; background: #e2e8f0; overflow: hidden; }
        .progress-bar { 
            background: var(--success-grad); background-size: 200% 100%;
            border-radius: 50px; animation: shimmer 2s linear infinite;
        }
        @keyframes shimmer { 0% { background-position: 100% 0%; } 100% { background-position: -100% 0%; } }

        /* 智能彩色控制台 */
        .console-wrapper { position: relative; }
        .console { 
            background: #0f172a; color: #cbd5e1; height: 480px; 
            overflow-y: auto; font-family: 'Fira Code', 'Consolas', monospace; 
            font-size: 13px; padding: 25px; border-radius: 28px; border: 4px solid #1e293b; 
        }
        .log-line { 
            margin-bottom: 6px; padding: 8px 15px; border-radius: 10px; 
            display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
            border-left: 4px solid transparent; background: rgba(255,255,255,0.02);
        }
        .log-line:hover { background: rgba(255,255,255,0.05); }
        .log-success { color: #4ade80; border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .log-fail { color: #fb7185; border-left-color: #f43f5e; background: rgba(244, 63, 94, 0.1); }
        
        .scroll-tag { 
            position: absolute; bottom: 25px; right: 40px; background: #3b82f6; 
            color: white; padding: 6px 16px; border-radius: 50px; font-size: 11px; 
            opacity: 0; transition: 0.4s; pointer-events: none; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }
        .scroll-tag.show { opacity: 1; }

        /* 模态框美化 */
        .modal-content { border-radius: 35px !important; border: none !important; padding: 15px; }
        .hw-console { background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 15px; border-radius: 15px; height: 160px; overflow-y: auto; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header text-center">
        <h3 class="fw-800 animate__animated animate__fadeInDown"><i class="bi bi-cpu-fill me-2 text-warning"></i> M3U Pro</h3>
        <button class="btn btn-grad btn-add mt-4 shadow" onclick="showAddModal()">
            <i class="bi bi-plus-circle-fill"></i> 新增任务
        </button>
    </div>
    <div id="subsList" class="sub-list"></div>
</div>

<div class="main">
    <div id="noSelect" class="h-100 d-flex flex-column align-items-center justify-content-center opacity-25">
        <i class="bi bi-collection-play display-1 mb-3"></i>
        <h2 class="fw-800">Ready to Scan</h2>
        <p>从左侧面板选择任务，开启实时大屏分析</p>
    </div>

    <div id="dashboard" class="d-none animate__animated animate__fadeIn">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div><h1 id="viewName" class="fw-800 mb-0">--</h1><span id="viewUrl" class="badge bg-white text-primary border shadow-sm mt-2 p-2 px-3 rounded-pill"></span></div>
            <div class="btn-group-custom">
                <button id="runBtn" class="btn btn-grad btn-success-grad" onclick="startTask()"><i class="bi bi-play-fill"></i> 立即执行</button>
                <button id="stopBtn" class="btn btn-grad btn-danger-grad d-none" onclick="stopTask()"><i class="bi bi-stop-fill"></i> 停止检测</button>
                <button class="btn btn-grad btn-warning-grad" onclick="editCurrent()"><i class="bi bi-sliders"></i> 配置</button>
                <button class="btn btn-grad btn-info-grad" onclick="showSettings()"><i class="bi bi-gear-fill"></i> 系统设置</button>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3"><div class="glass-card stat-card"><i class="bi bi-list-task"></i><div class="text-muted small fw-bold">总频道数</div><div id="statTotal" class="stat-value">0</div></div></div>
            <div class="col-md-3"><div class="glass-card stat-card text-info"><i class="bi bi-lightning-charge"></i><div class="text-muted small fw-bold">已处理</div><div id="statCurrent" class="stat-value">0</div></div></div>
            <div class="col-md-3"><div class="glass-card stat-card text-success"><i class="bi bi-shield-check"></i><div class="text-muted small fw-bold">有效源</div><div id="statSuccess" class="stat-value">0</div></div></div>
            <div class="col-md-3"><div class="glass-card stat-card text-primary"><i class="bi bi-graph-up"></i><div class="text-muted small fw-bold">成功率</div><div id="statRate" class="stat-value">0%</div></div></div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="glass-card h-100 mb-0">
                    <div class="d-flex justify-content-between small fw-800 mb-2"><span>实时检测进度</span><span id="pText" class="text-primary">0%</span></div>
                    <div class="progress mb-4"><div id="pBar" class="progress-bar progress-bar-striped"></div></div>
                    <label class="form-label fw-bold small text-muted text-uppercase">M3U 订阅地址</label>
                    <div class="input-group mb-3"><input type="text" id="m3uUrl" class="form-control border-0 bg-light rounded-start-4" readonly><button class="btn btn-dark rounded-end-4" onclick="copy('m3uUrl')">复制</button></div>
                    <label class="form-label fw-bold small text-muted text-uppercase">TXT 格式地址</label>
                    <div class="input-group"><input type="text" id="txtUrl" class="form-control border-0 bg-light rounded-start-4" readonly><button class="btn btn-dark rounded-end-4" onclick="copy('txtUrl')">复制</button></div>
                </div>
            </div>
            <div class="col-lg-3"><div class="glass-card h-100 mb-0 text-center"><h6 class="fw-bold mb-3 small text-muted">画质分布占比</h6><div style="height:210px"><canvas id="resChart"></canvas></div></div></div>
            <div class="col-lg-3"><div class="glass-card h-100 mb-0 text-center"><h6 class="fw-bold mb-3 small text-muted">延迟区间分布</h6><div style="height:210px"><canvas id="latChart"></canvas></div></div></div>
        </div>

        <div class="console-wrapper mt-4">
            <div id="console" class="console shadow-lg"></div>
            <div id="scrollTag" class="scroll-tag"><i class="bi bi-pin-angle-fill me-1"></i> 实时追踪开启</div>
        </div>
    </div>
</div>

<!-- 任务弹窗 -->
<div class="modal fade" id="editModal" data-bs-backdrop="static" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content shadow-lg"><div class="modal-header border-0 px-4 py-3"><h5 class="modal-title fw-800">订阅参数配置</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-4"><input type="hidden" id="editId"><div class="mb-4"><label class="form-label small fw-bold">名称</label><input type="text" id="editName" class="form-control form-control-lg bg-light border-0" style="border-radius:15px;"></div><div class="mb-4"><label class="form-label small fw-bold">订阅 URL</label><input type="text" id="editUrl" class="form-control form-control-lg bg-light border-0" style="border-radius:15px;"></div><div class="row g-3 mb-4"><div class="col-6"><label class="form-label small fw-bold">并发线程</label><input type="number" id="editThreads" class="form-control form-control-lg bg-light border-0" value="10" style="border-radius:15px;"></div><div class="col-6"><label class="form-label small fw-bold">计划模式</label><select id="editMode" class="form-select form-select-lg bg-light border-0" onchange="toggleFields()" style="border-radius:15px;"><option value="none">手动</option><option value="fixed">定时</option><option value="interval">间隔</option></select></div></div><div id="ef" class="mb-4 d-none"><input type="text" id="editTimes" class="form-control form-control-lg bg-light border-0" placeholder="08:00, 20:00" style="border-radius:15px;"></div><div id="ei" class="mb-4 d-none"><input type="number" id="editHours" class="form-control form-control-lg bg-light border-0" placeholder="12" style="border-radius:15px;"></div><div class="d-flex align-items-center justify-content-between mb-4 bg-light p-3 rounded-4"><label class="form-label fw-bold mb-0">是否启用此计划</label><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="editEnabled" checked style="width:45px; height:22px;"></div></div><div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top"><button class="btn-outline-danger-custom" onclick="deleteSub()" id="delBtn"><i class="bi bi-trash3-fill"></i> 移除</button><button class="btn btn-grad btn-primary-grad px-5" onclick="saveSub()">保存同步</button></div></div></div></div></div>

<!-- 设置弹窗 -->
<div class="modal fade" id="settingsModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content shadow-lg p-4"><h5 class="fw-800 mb-4 text-center">系统设置</h5><div class="d-flex align-items-center justify-content-between mb-4 bg-primary bg-opacity-10 p-4 rounded-4"><div><h6 class="fw-bold mb-1">GPU 硬件加速探测</h6><p class="small text-muted mb-0">Intel QSV/VAAPI</p></div><div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="globalHwAccel" style="width:50px; height:25px;"></div></div><h6 class="fw-bold mb-3 small">环境诊断 (vainfo)</h6><div class="hw-console mb-3" id="hwOutput">等待测试...</div><button class="btn btn-dark w-100 mb-4 rounded-3 py-2" onclick="testHardware()">运行诊断</button><button class="btn btn-grad btn-primary-grad w-100 py-3" onclick="saveGlobalSettings()">应用全局配置</button></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let subs = [], currentId = null, pollTimer = null, autoScroll = true, resChart = null, latChart = null;
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));
    const settingsModal = new bootstrap.Modal(document.getElementById('settingsModal'));
    const conBox = document.getElementById('console');

    function initCharts() {
        if(resChart) resChart.destroy(); if(latChart) latChart.destroy();
        const ctxR = document.getElementById('resChart').getContext('2d');
        resChart = new Chart(ctxR, { type:'doughnut', data:{ labels:['4K','1080P','720P','SD'], datasets:[{ data:[0,0,0,0], backgroundColor:['#8b5cf6','#3b82f6','#10b981','#f59e0b'], borderWidth:0 }] }, options:{ cutout:'75%', plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{ size:10 } } } }, maintainAspectRatio:false } });
        const ctxL = document.getElementById('latChart').getContext('2d');
        latChart = new Chart(ctxL, { type:'bar', data:{ labels:['<100ms','<500ms','>500ms'], datasets:[{ data:[0,0,0], backgroundColor:'#6366f1', borderRadius:8 }] }, options:{ scales:{ y:{ beginAtZero:true, grid:{ display:false } }, x:{ grid:{ display:false } } }, plugins:{ legend:{ display:false } }, maintainAspectRatio:false } });
    }

    conBox.addEventListener('scroll', () => {
        autoScroll = conBox.scrollHeight - conBox.scrollTop - conBox.clientHeight < 120;
        document.getElementById('scrollTag').classList.toggle('show', autoScroll);
    });

    async function loadSubs() {
        try {
            const res = await fetch('/api/subs'); const data = await res.json();
            subs = data.subs; document.getElementById('globalHwAccel').checked = data.settings.use_hwaccel;
            document.getElementById('subsList').innerHTML = subs.map(s => `
                <div class="sub-item ${s.id === currentId ? 'active' : ''} ${s.enabled === false ? 'sub-disabled' : ''}" onclick="selectSub('${s.id}')">
                    <div class="d-flex align-items-center justify-content-between"><div class="fw-bold text-truncate">${s.name}</div>${s.enabled === false ? '<span class="badge bg-secondary">OFF</span>' : ''}</div>
                    <div class="small opacity-50 text-truncate mt-1" style="font-size:10px">${s.url}</div>
                </div>`).join('');
        } catch (e) {}
    }

    function selectSub(id) {
        currentId = id; document.getElementById('noSelect').classList.add('d-none'); document.getElementById('dashboard').classList.remove('d-none');
        const s = subs.find(x => x.id === id); if(!s) return;
        document.getElementById('viewName').innerText = s.name; document.getElementById('viewUrl').innerText = s.url;
        document.getElementById('m3uUrl').value = `${window.location.origin}/sub/${id}.m3u`;
        document.getElementById('txtUrl').value = `${window.location.origin}/sub/${id}.txt`;
        initCharts(); loadSubs(); if(pollTimer) clearInterval(pollTimer); pollTimer = setInterval(updateStatus, 1500);
    }

    async function updateStatus() {
        if(!currentId) return;
        try {
            const res = await fetch('/api/status/' + currentId); const data = await res.json();
            document.getElementById('statTotal').innerText = data.total || 0;
            document.getElementById('statCurrent').innerText = data.current || 0;
            document.getElementById('statSuccess').innerText = data.success || 0;
            document.getElementById('statRate').innerText = (data.current > 0 ? Math.round(data.success/data.current*100) : 0) + '%';
            document.getElementById('pBar').style.width = Math.round(data.current/data.total*100 || 0) + '%';
            document.getElementById('pText').innerText = Math.round(data.current/data.total*100 || 0) + '%';
            if(data.analytics && resChart) {
                resChart.data.datasets[0].data = [data.analytics.res['4K']||0, data.analytics.res['1080P']||0, data.analytics.res['720P']||0, data.analytics.res['SD']||0]; resChart.update('none');
                latChart.data.datasets[0].data = [data.analytics.lat['<100ms']||0, data.analytics.lat['<500ms']||0, data.analytics.lat['>500ms']||0]; latChart.update('none');
            }
            const rb = document.getElementById('runBtn'), sb = document.getElementById('stopBtn');
            if(data.running){ rb.classList.add('d-none'); sb.classList.remove('d-none'); } else { rb.classList.remove('d-none'); sb.classList.add('d-none'); }
            conBox.innerHTML = data.logs.map(l => `<div class="log-line ${l.includes('✅')?'log-success':(l.includes('❌')?'log-fail':'')}">${l}</div>`).join('');
            if(autoScroll) conBox.scrollTop = conBox.scrollHeight;
        } catch(e) {}
    }

    function showAddModal() { document.getElementById('editId').value = ""; document.getElementById('editName').value = ""; document.getElementById('editUrl').value = ""; document.getElementById('editThreads').value = 10; document.getElementById('editMode').value = "none"; document.getElementById('editEnabled').checked = true; toggleFields(); editModal.show(); }
    function editCurrent() { const s = subs.find(x => x.id === currentId); if(!s) return; document.getElementById('editId').value = s.id; document.getElementById('editName').value = s.name; document.getElementById('editUrl').value = s.url; document.getElementById('editThreads').value = s.threads || 10; document.getElementById('editMode').value = s.schedule_mode || 'none'; document.getElementById('editTimes').value = s.fixed_times || ''; document.getElementById('editHours').value = s.interval_hours || 12; document.getElementById('editEnabled').checked = s.enabled !== false; toggleFields(); editModal.show(); }
    function toggleFields() { const m = document.getElementById('editMode').value; document.getElementById('ef').classList.toggle('d-none', m !== 'fixed'); document.getElementById('ei').classList.toggle('d-none', m !== 'interval'); }
    async function saveSub() { const d = { id: document.getElementById('editId').value, name: document.getElementById('editName').value, url: document.getElementById('editUrl').value, threads: document.getElementById('editThreads').value, schedule_mode: document.getElementById('editMode').value, fixed_times: document.getElementById('editTimes').value, interval_hours: document.getElementById('editHours').value, enabled: document.getElementById('editEnabled').checked }; await fetch('/api/subs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) }); editModal.hide(); loadSubs(); }
    async function deleteSub() { if(confirm('确定彻底移除任务？')) { await fetch('/api/subs/delete/' + currentId); editModal.hide(); currentId = null; document.getElementById('dashboard').classList.add('d-none'); document.getElementById('noSelect').classList.remove('d-none'); loadSubs(); } }
    function startTask() { if(currentId) fetch('/api/start/' + currentId); autoScroll = true; }
    function stopTask() { if(currentId) fetch('/api/stop/' + currentId); }
    function showSettings() { settingsModal.show(); }
    async function saveGlobalSettings() { const h = document.getElementById('globalHwAccel').checked; await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({use_hwaccel: h}) }); settingsModal.hide(); alert('系统配置已保存'); }
    async function testHardware() { const out = document.getElementById('hwOutput'); out.innerText = "诊断中..."; const r = await fetch('/api/hw_test'); const d = await r.json(); out.innerText = d.output; out.style.color = d.status === "success" ? "#4ade80" : "#f87171"; }
    function copy(id) { const el = document.getElementById(id); el.select(); document.execCommand('copy'); const b = event.target; const old = b.innerText; b.innerText = "COPIED"; setTimeout(() => b.innerText = old, 1500); }

    window.onload = loadSubs;
</script>
</body>
</html>
